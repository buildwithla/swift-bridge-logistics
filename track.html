<!DOCTYPE html>
<html lang="en" data-page="track">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Track Shipment | Swift Bridge Logistics</title>
    <link rel="shortcut icon" href="assets/logo.png" type="image/png" />
    <link rel="stylesheet" href="styles.css" />
</head>

<body>
    <header class="site-header">
        <nav class="navbar">
            <a class="brand" href="index.html">
                <img src="assets/logo.png" alt="Swift Bridge Logistics" class="logo nav-logo" />
            </a>
            <div class="nav-links">
                <a href="index.html">Home</a>
                <a class="active" href="track.html">Track</a>
                <a href="index.html#services">Services</a>
                <a href="index.html#contact">Contact</a>
            </div>
        </nav>
    </header>

    <main class="page-shell track-page">
        <section class="track-panel">
            <div class="page-title-row">
                <img src="assets/logo.png" alt="Swift Bridge Logistics" class="logo nav-logo" />
                <div>
                    <h1>Track your shipment</h1>
                    <p>Enter a tracking number to view status, location, and timeline.</p>
                </div>
            </div>

            <form id="trackForm" class="tracking-form">
                <label for="trackingNumber">Tracking number</label>
                <input id="trackingNumber" name="trackingNumber" type="text" placeholder="" required />
                <button type="submit" class="btn btn-primary">Search</button>
            </form>

            <div id="trackResult" class="tracking-result hidden"></div>
        </section>
    </main>

    <footer class="site-footer">
        <img src="assets/logo.png" alt="Swift Bridge Logistics" class="logo footer-logo" />
        <p>Swift Bridge Logistics · Reliable logistics tracking for every shipment.</p>
        <div class="contact-info">
            <p><strong>Contact Us:</strong></p>
            <ul>
                <li>Email: <a href="mailto:swiftbridgelogistics@gmail.com">swiftbridgelogistics@gmail.com</a></li>
                <li>Phone: <a href="tel:+13465631025">+1 (346) 563-1025</a></li>
            </ul>
        </div>
    </footer>

    <script defer src="app.js"></script>
</body>

</html>
